<!doctype html>
<html lang="uk">
	<head>
		<meta charset="utf-8" />
		<title>Horeca</title>
		<base href="/" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script>
			try {
				const storedMode = localStorage.getItem('app-mode');
				const preferredMode =
					storedMode === 'dark' || storedMode === 'light'
						? storedMode
						: window.matchMedia('(prefers-color-scheme: dark)').matches
							? 'dark'
							: 'light';
				document.documentElement.setAttribute('data-mode', preferredMode);
			} catch {}
		</script>

		<meta name="description" content="Horeca" />
		<meta name="keywords" content="Horeca" />
		<meta name="author" content="Horeca" />
		<meta name="robots" content="index, follow" />
		<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />

		<meta itemprop="name" content="Horeca" />
		<meta itemprop="description" content="Horeca" />
		<meta itemprop="image" content="/logo.webp" />

		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="Horeca" />
		<meta property="og:locale" content="uk_UA" />
		<meta property="og:url" content="/" />
		<meta property="og:title" content="Horeca" />
		<meta property="og:description" content="Horeca" />
		<meta property="og:image" content="/logo.webp" />

		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Horeca" />
		<meta name="twitter:description" content="Horeca" />
		<meta name="twitter:image" content="/logo.webp" />
		<meta name="twitter:image:src" content="/logo.webp" />

		<link rel="canonical" href="/" />
		<link rel="icon" type="image/webp" href="favicon.webp" />

		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
			rel="stylesheet"
		/>
		<link
			href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
			rel="stylesheet"
		/>
	</head>
	<body>
		<app-root></app-root>
	</body>
</html>
