<form
	class="mt-5 grid gap-4 rounded-[1.25rem] border border-[var(--c-border)] bg-[var(--c-bg-primary)] p-5 sm:p-6 lg:grid-cols-[minmax(0,1fr)_14rem]"
	[formRoot]="bookingForm"
>
	<div class="grid gap-4">
		<div class="grid gap-4 sm:grid-cols-2">
			<label class="block">
				<span class="flex items-center gap-2 text-sm font-semibold text-[var(--c-text-secondary)]">
					<span>
						<span [translate]="'Phone'">{{ 'Phone' }}</span>
						<span class="text-[var(--c-secondary)]" aria-hidden="true">*</span>
					</span>
					<span
						class="rounded-full bg-[color:rgba(197,61,61,0.14)] px-2 py-0.5 text-[10px] font-semibold uppercase tracking-[0.12em] text-[var(--c-secondary)]"
						[translate]="'Required'"
					>
						{{ 'Required' }}
					</span>
				</span>
				<input
					class="mt-2 w-full rounded-[0.9rem] border border-[var(--c-secondary)] bg-[var(--c-bg-primary)] px-4 py-3 text-sm text-[var(--c-text-secondary)] outline-none ring-1 ring-[color:rgba(197,61,61,0.24)] transition-colors focus:border-[var(--c-secondary)] focus:ring-2"
					type="tel"
					autocomplete="tel"
					[attr.placeholder]="company.phone"
					[formField]="bookingForm.phone"
					[attr.aria-required]="true"
					[attr.aria-invalid]="bookingForm.phone().invalid()"
					[attr.aria-describedby]="phoneHelpId()"
				/>
				@if (bookingForm.phone().touched() && bookingForm.phone().invalid()) {
					<p
						[id]="phoneHelpId()"
						class="mt-2 text-xs font-semibold text-[var(--c-secondary)]"
					>
						<span [translate]="'Phone number is required'">
							{{ 'Phone number is required' }}
						</span>
					</p>
				} @else {
					<p
						[id]="phoneHelpId()"
						class="mt-2 text-xs font-medium text-[var(--c-text-muted)]"
					>
						<span [translate]="'Required for booking confirmation'">
							{{ 'Required for booking confirmation' }}
						</span>
					</p>
				}
			</label>

			@if (hasRoomSelect()) {
				<label class="block">
					<span class="text-sm font-semibold text-[var(--c-text-secondary)]">
						<span [translate]="'Selected'">{{ 'Selected' }}</span>
					</span>
					<select
						class="mt-2 w-full rounded-[0.9rem] border border-[var(--c-border)] bg-[var(--c-bg-primary)] px-4 py-3 text-sm text-[var(--c-text-secondary)] outline-none transition-colors focus:border-[var(--c-secondary)]"
						[formField]="bookingForm.room"
					>
						<option value="" [translate]="'room'">{{ 'room' }}</option>
						@for (room of rooms(); track room.slug) {
							<option [value]="room.name">{{ room.name }}</option>
						}
					</select>
				</label>
			}

			<label class="block">
				<span class="text-sm font-semibold text-[var(--c-text-secondary)]">
					<span [translate]="'Date'">{{ 'Date' }}</span>
				</span>
				<input
					class="mt-2 w-full rounded-[0.9rem] border border-[var(--c-border)] bg-[var(--c-bg-primary)] px-4 py-3 text-sm text-[var(--c-text-secondary)] outline-none transition-colors focus:border-[var(--c-secondary)]"
					type="date"
					[formField]="bookingForm.date"
				/>
			</label>
		</div>

		<label class="block">
			<span class="text-sm font-semibold text-[var(--c-text-secondary)]">
				<span [translate]="'Comment'">{{ 'Comment' }}</span>
			</span>
			<textarea
				class="mt-2 min-h-24 w-full resize-y rounded-[0.9rem] border border-[var(--c-border)] bg-[var(--c-bg-primary)] px-4 py-3 text-sm text-[var(--c-text-secondary)] outline-none transition-colors focus:border-[var(--c-secondary)]"
				[formField]="bookingForm.message"
			></textarea>
		</label>
	</div>

	<div class="flex flex-col justify-end">
		<button
			class="ui-btn ui-btn-primary justify-center disabled:cursor-not-allowed disabled:opacity-60"
			type="submit"
			[disabled]="!!submittedRequest()"
		>
			<span [translate]="'Send request'">{{ 'Send request' }}</span>
		</button>

		@if (submitMessage()) {
			<div class="mt-3 rounded-[0.9rem] bg-[color:rgba(70,130,90,0.12)] p-3 text-sm font-semibold leading-6 text-[var(--c-text-secondary)]">
				<span [translate]="submitMessage()">{{ submitMessage() }}</span>
			</div>
		}

		@if (submitError()) {
			<div class="mt-3 rounded-[0.9rem] bg-[color:rgba(197,61,61,0.14)] p-3 text-sm font-semibold leading-6 text-[var(--c-secondary)]">
				<span [translate]="submitError()">{{ submitError() }}</span>
			</div>
		}
	</div>
</form>
