<header
	class="relative z-40 border-b border-[var(--c-border)] bg-[var(--c-bg-secondary)]/95 backdrop-blur supports-[backdrop-filter]:bg-[var(--c-bg-secondary)]/80"
>
	<div
		class="mx-auto flex min-h-16 w-full max-w-[var(--container)] items-center justify-between px-4 py-3 sm:px-6"
	>
		<a
			translate
			[translate]="{ ariaLabel: 'Go to homepage' }"
			class="inline-flex items-center text-xs font-semibold tracking-[0.18em] text-[var(--c-text-secondary)] uppercase"
			routerLink="/"
		>
			Horeca
		</a>

		<div class="flex items-center gap-2">
			<div
				class="relative flex items-center gap-1 rounded-full border border-[var(--c-border)] bg-[var(--c-bg-primary)] p-1 shadow-[var(--shadow-sm)]"
			>
				<button
					class="inline-flex h-9 items-center gap-2 rounded-full px-3 text-sm font-medium text-[var(--c-text-primary)] transition-colors duration-200 hover:bg-[var(--c-bg-tertiary)] focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[color:var(--c-primary)] focus-visible:ring-offset-2 focus-visible:ring-offset-[var(--c-bg-secondary)]"
					translate
					[translate]="{ ariaLabel: languageCycleLabel() }"
					(click)="nextLanguage()"
					type="button"
				>
					<img
						class="h-5 w-7 rounded-[4px] border border-black/10 object-cover"
						[alt]="currentLanguage().nativeName"
						[ngSrc]="currentLanguage().flagSrc"
						width="28"
						height="20"
					/>
				</button>

				<button
					class="inline-flex h-9 w-9 items-center justify-center rounded-full text-[var(--c-text-secondary)] transition-colors duration-200 hover:bg-[var(--c-bg-tertiary)] focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[color:var(--c-primary)] focus-visible:ring-offset-2 focus-visible:ring-offset-[var(--c-bg-secondary)]"
					[attr.aria-expanded]="languageMenuOpen()"
					translate
					[translate]="{ ariaLabel: languageMenuLabel() }"
					(click)="toggleLanguageMenu()"
					type="button"
				>
					<span class="material-symbols-outlined text-[20px]" aria-hidden="true">
						arrow_drop_down
					</span>
				</button>

				@if (languageMenuOpen()) {
					<div
						class="absolute right-0 top-[calc(100%+0.5rem)] z-10 min-w-48 overflow-hidden rounded-2xl border border-[var(--c-border)] bg-[var(--c-bg-primary)] p-1 shadow-[var(--shadow-md)]"
					>
						@for (language of languages(); track language.code) {
							<button
								class="flex w-full items-center gap-3 rounded-[calc(var(--radius-btn)-0.25rem)] px-3 py-2 text-left text-sm text-[var(--c-text-primary)] transition-colors duration-200 hover:bg-[var(--c-bg-tertiary)] focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[color:var(--c-primary)]"
								(click)="setLanguage(language)"
								type="button"
							>
								<img
									class="h-5 w-7 rounded-[4px] border border-black/10 object-cover"
									[alt]="language.nativeName"
									[ngSrc]="language.flagSrc"
									width="28"
									height="20"
								/>
								<span>{{ language.nativeName }}</span>
							</button>
						}
					</div>
				}
			</div>

			<button
				class="inline-flex h-11 w-11 items-center justify-center rounded-full border border-[var(--c-border)] bg-[var(--c-bg-primary)] text-[var(--c-text-secondary)] transition-colors duration-200 hover:bg-[var(--c-bg-tertiary)] focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[color:var(--c-primary)] focus-visible:ring-offset-2 focus-visible:ring-offset-[var(--c-bg-secondary)]"
				translate
				[translate]="{ ariaLabel: toggleLabel() }"
				(click)="toggleMode()"
				type="button"
			>
				<span class="material-symbols-outlined text-[22px]" aria-hidden="true">
					{{ toggleIcon() }}
				</span>
			</button>
		</div>
	</div>
</header>
