<main class="mx-auto max-w-[var(--container)] px-3 pb-8 pt-3 sm:px-4 sm:pb-10">
	@if (isLoading()) {
		<section
			class="rounded-[1.2rem] border border-[var(--c-border)] bg-[var(--c-bg-secondary)] px-4 py-10 text-center sm:px-6 sm:py-14"
			aria-busy="true"
			aria-live="polite"
		>
			<div
				class="mx-auto inline-flex h-14 w-14 items-center justify-center rounded-full border border-[var(--c-border)] bg-[var(--c-bg-primary)] text-[var(--c-secondary)]"
			>
				<span class="material-symbols-outlined animate-pulse text-[28px]" aria-hidden="true">
					photo_library
				</span>
			</div>

			<p class="mt-4 text-[12px] font-semibold uppercase tracking-[0.18em] text-[var(--c-secondary)]">
				<span [translate]="'Gallery'">{{ 'Gallery' }}</span>
			</p>
			<p class="mt-2 text-sm text-[var(--c-text-muted)]"><span [translate]="'Loading gallery...'">{{ 'Loading gallery...' }}</span></p>
		</section>
	} @else if (exhibits().length) {
		<section
			class="overflow-hidden rounded-[1.2rem] border border-[var(--c-border)] bg-[var(--c-bg-secondary)] shadow-[var(--shadow-sm)]"
		>
			<div
				class="border-b border-[var(--c-border)] bg-[linear-gradient(135deg,rgba(197,61,61,0.14),rgba(217,168,88,0.08))] px-4 py-5 sm:px-5"
			>
				<h1
					class="text-[12px] font-semibold uppercase tracking-[0.18em] text-[var(--c-secondary)]"
					translate
				>
					Gallery
				</h1>
			</div>

			<div class="grid gap-3 p-3 sm:grid-cols-2 sm:p-4 lg:grid-cols-3">
				@for (exhibit of exhibits(); track exhibit.slug) {
					<figure
						class="overflow-hidden rounded-[1rem] border border-[var(--c-border)] bg-[var(--c-bg-primary)]"
					>
						<app-image
							imageClass="h-72 w-full object-cover sm:h-80"
							[src]="exhibit.src"
							translate [translate]="{ alt: exhibit.alt }"
							[openLabel]="'Open photo in full screen'"
							[closeLabel]="'Close full screen photo'"
						/>
					</figure>
				}
			</div>
		</section>
	} @else {
		<section
			class="rounded-[1.2rem] border border-dashed border-[var(--c-border)] bg-[var(--c-bg-secondary)] px-4 py-10 text-center sm:px-6 sm:py-14"
		>
			<div
				class="mx-auto inline-flex h-14 w-14 items-center justify-center rounded-full border border-[var(--c-border)] bg-[var(--c-bg-primary)] text-[var(--c-secondary)]"
			>
				<span class="material-symbols-outlined text-[28px]" aria-hidden="true">
					photo_library
				</span>
			</div>

			<p class="mt-4 text-[12px] font-semibold uppercase tracking-[0.18em] text-[var(--c-secondary)]">
				<span [translate]="'Gallery'">{{ 'Gallery' }}</span>
			</p>

			<h1 class="mt-2 text-xl font-semibold text-[var(--c-text-secondary)]">
				<span [translate]="'The gallery is currently empty'">{{ 'The gallery is currently empty' }}</span>
			</h1>
		</section>
	}
</main>
